<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erosion — live hydraulic terrain sculpting</title>
  <meta name="description" content="A real-time procedural terrain sculptor: layered noise carved live by a hydraulic erosion simulation, rendered in WebGL." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23171b20'/%3E%3Ccircle cx='32' cy='32' r='21' fill='none' stroke='%23c98a3f' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%23c98a3f' stroke-width='3'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%23c98a3f'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="app">
    <main class="viewport" id="viewport">
      <canvas id="terrain" aria-label="Live 3D terrain, carved in real time by hydraulic erosion"></canvas>
      <div class="bezel-ring" aria-hidden="true"></div>
      <header class="masthead">
        <h1 class="wordmark">Ero<span class="wordmark-accent">sion</span></h1>
        <p class="status" id="status" role="status" aria-live="polite">stable</p>
      </header>
      <button id="mute-toggle" class="btn-icon" type="button" aria-label="Mute sound" aria-pressed="false">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M4 9v6h4l5 5V4L8 9H4z" />
          <path id="mute-toggle-waves" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8.5 8.5 0 0 1 0 12" />
          <path id="mute-toggle-slash" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" d="M16 8l6 8" style="display:none" />
        </svg>
      </button>
    </main>
    <aside class="console" id="console" aria-label="Terrain controls">
      <button
        class="console-handle"
        id="console-handle"
        type="button"
        aria-label="Expand or collapse controls"
        aria-expanded="false"
        aria-controls="console-body"
      ></button>
      <div class="console-body" id="console-body">
      <section class="console-section" aria-labelledby="noise-heading">
        <h2 id="noise-heading">Noise</h2>
        <div id="noise-controls"></div>
      </section>
      <section class="console-section" aria-labelledby="erosion-heading">
        <h2 id="erosion-heading">Erosion</h2>
        <div id="erosion-controls"></div>
      </section>
      <button id="regenerate" class="btn btn-regenerate" type="button">
        Regenerate terrain
      </button>
      </div>
    </aside>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
